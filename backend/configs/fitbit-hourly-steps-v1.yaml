adapter:
  id: "fitbit-hourly-steps-v1"
  version: "1.0.0"
  description: "Fitbit hourly step counts"

match:
  source: "fitbit"
  record:
    - { field: "Id", exists: true }
    - { field: "ActivityHour", exists: true }
    - { field: "StepTotal", exists: true }
    - { field: "Id", type: "integer" }
    - { field: "ActivityHour", type: "string" }
    - { field: "StepTotal", type: "integer" }

defaults:
  subject_id: { path: "Id" }
  context:
    source: "fitbit"
    modality: "wearable"
    device: null
    source_measurement_type: "steps-hourly"
  stage: "structured"
  source_record_id:
    template: "fitbit:{Id}:{ActivityHour}"

emit:
  - id: "hourly-steps"
    description: "Hourly step count measurement"
    type: "measurement"
    category: "step-count"
    granularity: "interval"
    timestamp:
      start: { path: "ActivityHour", transform: "iso_millis" }
      end: { path: "ActivityHour", transform: "iso_millis" }
      duration_seconds: 3600
    payload:
      value: { path: "StepTotal", transform: "to_int" }
      raw_value: { path: "StepTotal" }
      unit: "count"
      label: "Hourly Step Count"
    extensions:
      fitbit.source_measurement_type: "steps-hourly"
      fitbit.activity_hour: { path: "ActivityHour" }
