adapter:
  id: "virtual-supermarket-game-score-v1"
  version: "1.0.0"
  description: "Scores and per-round results from a virtual supermarket game"

match:
  source: "virtual-supermarket-game"
  record:
    - { field: "email", exists: true }
    - { field: "results", type: "array", non_empty: true }
    - { field: "results[0]", type: "object" }
    - { field: "results[0].startTime", exists: true }
    - { field: "results[0].totalTime", exists: true }
    - { field: "results[0].itemTypesBought", exists: true }
    - { field: "results[0].itemTypesListed", exists: true }
    - { field: "results[0].itemQuantitiesBought", exists: true }
    - { field: "results[0].itemQuantitiesListed", exists: true }
    - { field: "results[0].itemTypesUnlisted", exists: true }
    - { field: "results[0].itemQuantitiesUnlisted", exists: true }
    - { field: "results[0].itemsBoughtValue", exists: true }
    - { field: "results[0].level", exists: true }
    - { field: "results[0].moneyPaid", exists: true }

defaults:
  subject_id: { path: "email" }
  context:
    source: "virtual-supermarket-game"
    modality: "game"
    device: null
    source_measurement_type: "score-result"
  stage: "structured"
  source_record_id:
    template: "virtual-supermarket-game:{email}"

emit:
  - id: "round-score-summary"
    description: "One canonical summary event per game round/result entry"
    type: "summary"
    category: "supermarket-round-score"
    granularity: "instant"
    iterate: "results"

    timestamp:
      start:
        path: "@item.startTime"
        transform: "iso_millis"
      duration_seconds:
        path: "@item.totalTime"
        transform: "to_float"

    payload:
      value:
        path: "@item.moneyPaid"
      raw_value:
        path: "@item"
      unit: null
      label: "Virtual Supermarket Game Result"
      components:
        - name: "level"
          value: { path: "@item.level" }
        - name: "itemTypesBought"
          value: { path: "@item.itemTypesBought" }
        - name: "itemTypesListed"
          value: { path: "@item.itemTypesListed" }
        - name: "itemQuantitiesBought"
          value: { path: "@item.itemQuantitiesBought" }
        - name: "itemQuantitiesListed"
          value: { path: "@item.itemQuantitiesListed" }
        - name: "itemTypesUnlisted"
          value: { path: "@item.itemTypesUnlisted" }
        - name: "itemQuantitiesUnlisted"
          value: { path: "@item.itemQuantitiesUnlisted" }
        - name: "itemsBoughtValue"
          value: { path: "@item.itemsBoughtValue" }
        - name: "moneyPaid"
          value: { path: "@item.moneyPaid" }

    extensions:
      virtual-supermarket-game.startTime: { path: "@item.startTime" }
      virtual-supermarket-game.totalTime: { path: "@item.totalTime" }
      virtual-supermarket-game.level: { path: "@item.level" }
      virtual-supermarket-game.itemTypesBought: { path: "@item.itemTypesBought" }
      virtual-supermarket-game.itemTypesListed: { path: "@item.itemTypesListed" }
      virtual-supermarket-game.itemQuantitiesBought: { path: "@item.itemQuantitiesBought" }
      virtual-supermarket-game.itemQuantitiesListed: { path: "@item.itemQuantitiesListed" }
      virtual-supermarket-game.itemTypesUnlisted: { path: "@item.itemTypesUnlisted" }
      virtual-supermarket-game.itemQuantitiesUnlisted: { path: "@item.itemQuantitiesUnlisted" }
      virtual-supermarket-game.itemsBoughtValue: { path: "@item.itemsBoughtValue" }
      virtual-supermarket-game.moneyPaid: { path: "@item.moneyPaid" }
