adapter:
  id: "fitabase-fitbit-hourly-intensity-v1"
  version: "1.0.0"
  description: "Fitabase Fitbit export (CSV) — hourly intensity rows. Demonstrates parse_timestamp + a per-config range override + the cleaner/validator/qualifier blocks."

match:
  source: "fitbit"
  record:
    - { field: "Id", exists: true }
    - { field: "ActivityHour", exists: true }
    - { field: "TotalIntensity", exists: true }

defaults:
  subject_id: { path: "Id" }
  context:
    source: "fitbit"
    modality: "wearable"
    device: null
    source_measurement_type: "hourly intensity"
  stage: "structured"
  source_record_id:
    template: "fitbit:{Id}:{ActivityHour}"

emit:
  - id: "hourly-intensity"
    description: "Fitabase hourly intensity row. Timestamp in column ActivityHour is non-ISO and needs an explicit strptime format."
    type: "measurement"
    category: "activity-intensity"
    granularity: "interval"
    timestamp:
      start: { path: "ActivityHour", parse_timestamp: "%m/%d/%Y %I:%M:%S %p" }
      duration_seconds: 3600
    payload:
      value: { path: "TotalIntensity" }
      raw_value: { path: "TotalIntensity" }
      unit: "MET"
      label: "TotalIntensity"
      components:
        - name: "average_intensity"
          value: { path: "AverageIntensity" }
          unit: "MET"

clean:
  # The CSV connector hands every column over as a string, so the
  # type_coercer below promotes TotalIntensity / AverageIntensity to
  # numeric. The timestamp normalizer's accept_formats covers the
  # explicit strptime path the adapter already applied (defensive).
  heuristics:
    - whitespace
    - { name: timestamp_normalizer, accept_formats: ["%m/%d/%Y %I:%M:%S %p"] }
    - type_coercer
    - unit_inferrer

validate:
  enabled: [required_fields, timestamp_window, payload_shape, unit_whitelist, range]
  # Fitabase exports start in 2016 in the canonical research dataset.
  timestamp_window: { min: "2014-01-01", max: "now+1d" }
  categories:
    activity-intensity:
      unit_whitelist: ["MET"]
      range:
        min: 0
        max: 50
        on_violation: { severity: "warning", code: "INTENSITY_OUT_OF_RANGE" }

qualify:
  enabled: [completeness, duplicates, outliers, conformance, plausibility]
  outliers:    { hampel_k: 3.5, min_group_size: 5 }
  duplicates:  { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation]

omop:
  enabled: true
  include: [person, measurement, observation, device_exposure, observation_period]
