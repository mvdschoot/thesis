# Canonical-category quality rules.
#
# Indexed by canonical `category` (the value emitted by an adapter), these
# rules drive the validation and qualification stages. Per-adapter overrides
# can narrow any of these per emit-rule (see `quality_overrides:` in adapter
# YAMLs).
#
# Rationale notes inline (kept as comments so the thesis can cite this file
# directly as an artefact).

categories:
  # --- Fitbit / Withings vitals ---
  heart-rate:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [bpm]
    # Adult resting HR ~40-100; max HR ~220 (cf. Tanaka et al. 2001). Allow
    # athletic lows and intraday peaks; flag anything above 230 as warning.
    range: { min: 25, max: 230, on_violation: { severity: warning, code: HR_OUT_OF_RANGE } }

  heart-rate-zone:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit, payload.label]
    unit_whitelist: [min]
    range: { min: 0, max: 1440, on_violation: { severity: warning, code: HR_ZONE_MINUTES_OUT_OF_RANGE } }

  steps:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [count]
    range: { min: 0, max: 200000, on_violation: { severity: warning, code: STEPS_OUT_OF_RANGE } }

  distance:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [km, m]
    range: { min: 0, max: 200, on_violation: { severity: warning, code: DISTANCE_OUT_OF_RANGE } }

  calories:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [kcal]
    range: { min: 0, max: 20000, on_violation: { severity: warning, code: CALORIES_OUT_OF_RANGE } }

  floors:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [count]
    range: { min: 0, max: 1000, on_violation: { severity: warning, code: FLOORS_OUT_OF_RANGE } }

  elevation:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [m]
    range: { min: 0, max: 10000, on_violation: { severity: warning, code: ELEVATION_OUT_OF_RANGE } }

  weight:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [kg]
    range: { min: 20, max: 300, on_violation: { severity: error, code: WEIGHT_OUT_OF_RANGE } }

  height:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [m]
    range: { min: 0.5, max: 2.5, on_violation: { severity: error, code: HEIGHT_OUT_OF_RANGE } }

  body-fat-ratio:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: ["%"]
    range: { min: 2, max: 70, on_violation: { severity: warning, code: BODY_FAT_OUT_OF_RANGE } }

  fat-mass:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [kg]
    range: { min: 0, max: 200, on_violation: { severity: warning, code: FAT_MASS_OUT_OF_RANGE } }

  fat-free-mass:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [kg]
    range: { min: 0, max: 250, on_violation: { severity: warning, code: FAT_FREE_MASS_OUT_OF_RANGE } }

  muscle-mass:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [kg]
    range: { min: 0, max: 200, on_violation: { severity: warning, code: MUSCLE_MASS_OUT_OF_RANGE } }

  bone-mass:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [kg]
    range: { min: 0, max: 10, on_violation: { severity: warning, code: BONE_MASS_OUT_OF_RANGE } }

  body-water:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [kg, "%"]
    range: { min: 0, max: 200, on_violation: { severity: warning, code: BODY_WATER_OUT_OF_RANGE } }

  blood-pressure-systolic:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [mmHg]
    range: { min: 50, max: 260, on_violation: { severity: warning, code: BP_SYS_OUT_OF_RANGE } }

  blood-pressure-diastolic:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: [mmHg]
    range: { min: 30, max: 200, on_violation: { severity: warning, code: BP_DIA_OUT_OF_RANGE } }

  spo2:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: ["%"]
    range: { min: 50, max: 100, on_violation: { severity: warning, code: SPO2_OUT_OF_RANGE } }

  pulse-wave-velocity:
    expected_fields: [subject_id, timestamp, payload.value, payload.unit]
    unit_whitelist: ["m/s"]
    range: { min: 1, max: 30, on_violation: { severity: warning, code: PWV_OUT_OF_RANGE } }

  # --- App-usage events (string IDs, no numeric range / unit) ---
  exercise-completed:
    expected_fields: [subject_id, timestamp, payload.value]
  recipe-favorited:
    expected_fields: [subject_id, timestamp, payload.value]
  lesson-started:
    expected_fields: [subject_id, timestamp, payload.value]
  lesson-completed:
    expected_fields: [subject_id, timestamp, payload.value]
  profile-question-answered:
    expected_fields: [subject_id, timestamp, payload.value]
  badge-earned:
    expected_fields: [subject_id, timestamp, payload.value]

  # --- Game-score categories (numeric scores, no fixed unit) ---
  supermarket-round-score:
    expected_fields: [subject_id, timestamp, payload.value]
    range: { min: 0, max: 100000, on_violation: { severity: warning, code: SCORE_OUT_OF_RANGE } }

# Plausibility derivation thresholds.
plausibility_thresholds:
  # Any ERROR-severity flag → "exclude". (Hardcoded.)
  # WARNING count >= warning_count_for_review → "review".
  warning_count_for_review: 1

# Allowed ISO 8601 timestamp window for all events.
timestamp_window:
  min: "2000-01-01"
  max: "now+1d"
