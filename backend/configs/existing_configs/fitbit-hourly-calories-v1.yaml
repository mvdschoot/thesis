adapter:
  id: "fitbit-hourly-calories-v1"
  version: "1.0.0"
  description: "Fitbit hourly calories-burnt export (CSV) — one event per hour from ActivityHour and Calories."

match:
  source: "fitbit"
  record:
    - { field: "Id", exists: true }
    - { field: "ActivityHour", exists: true }
    - { field: "Calories", exists: true }

defaults:
  subject_id: { path: "Id" }
  context:
    source: "fitbit"
    modality: "wearable"
    device: null
    source_measurement_type: "hourly calories burned"
  stage: "structured"
  source_record_id:
    template: "fitbit:{Id}:{ActivityHour}"

emit:
  - id: "hourly-calories"
    description: "Hourly calories-burnt measurement from Fitbit CSV export."
    type: "measurement"
    category: "calories-burned"
    granularity: "interval"
    timestamp:
      start: { path: "ActivityHour", parse_timestamp: "%m/%d/%Y %I:%M:%S %p" }
      duration_seconds: 3600
    payload:
      value: { path: "Calories" }
      raw_value: { path: "Calories" }
      unit: "kcal"
      label: "Calories"

clean:
  heuristics:
    - whitespace
    - { name: timestamp_normalizer, accept_formats: ["%m/%d/%Y %I:%M:%S %p"] }
    - type_coercer
    - unit_inferrer

validate:
  enabled: [required_fields, timestamp_window, payload_shape, unit_whitelist, range]
  timestamp_window: { min: "2014-01-01", max: "now+1d" }
  categories:
    calories-burned:
      unit_whitelist: ["kcal"]
      range:
        min: 0
        max: 10000
        on_violation:
          severity: "warning"
          code: "CALORIES_OUT_OF_RANGE"

qualify:
  enabled: [completeness, duplicates, outliers, conformance, plausibility]
  outliers: { hampel_k: 3.5, min_group_size: 5 }
  duplicates: { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation]

omop:
  enabled: true
  include: [person, measurement, observation, device_exposure, observation_period]
