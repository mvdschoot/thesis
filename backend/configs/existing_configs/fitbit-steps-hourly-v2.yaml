adapter:
  id: "fitbit-steps-hourly-v2"
  version: "1.0.0"
  description: "Fitbit hourly step totals (v2) from CSV rows, one event per hour"

match:
  source: "fitbit-steps-hourly"
  record:
    - { field: "Id", exists: true }
    - { field: "ActivityHour", exists: true }
    - { field: "StepTotal", exists: true }

defaults:
  subject_id: "dummy-user"
  context:
    source: "fitbit-steps-hourly"
    modality: "wearable"
    device: null
    source_measurement_type: "hourly-step-total"
  stage: "structured"
  source_record_id:
    template: "fitbit-steps-hourly-v2:{Id}:{ActivityHour}"

emit:
  - id: "hourly-steps"
    description: "One hourly step-count measurement for the hour before the recorded ActivityHour"
    type: "measurement"
    category: "steps"
    granularity: "interval"

    timestamp:
      start: { path: "ActivityHour", transform: "iso_millis" }
      duration_seconds: 3600

    payload:
      value: { path: "StepTotal", transform: "to_int" }
      raw_value: { path: "StepTotal" }
      unit: "steps"
      label: "Hourly Steps"

    extensions:
      fitbit-steps-hourly.id: { path: "Id" }
      fitbit-steps-hourly.activityHour: { path: "ActivityHour" }
