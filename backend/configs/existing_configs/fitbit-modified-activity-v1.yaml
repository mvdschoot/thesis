adapter:
  id: fitbit-modified-activity-v1
  version: 1.0.0
  description: Heavily modified Fitbit activity exports with daily summaries plus intraday step, distance, and calorie datasets.
match:
  source: fitbit
  record:
    - field: userId
      exists: true
    - field: measurementType
      exists: true
    - field: measurementDateTime
      exists: true
    - field: measurementValue
      exists: true
defaults:
  subject_id:
    path: userId
  context:
    source: fitbit
    modality: wearable
    device: null
    source_measurement_type:
      path: measurementType
  stage: structured
  source_record_id:
    template: fitbit:{userId}:{measurementType}:{measurementDateTime}
emit:
  - id: steps-daily
    description: Daily step total from the modified Fitbit export.
    type: measurement
    category: steps
    granularity: daily
    timestamp:
      start:
        path: measurementValue.activities-steps[0].dateTime
        transform: iso_millis
    payload:
      value:
        path: measurementValue.activities-steps[0].value
        transform: to_int
      raw_value:
        path: measurementValue.activities-steps[0].value
      unit: steps
      label: activities-steps
      components:
        - name: measurement_type
          value:
            path: measurementType
        - name: measurement_date_time
          value:
            path: measurementDateTime
            transform: iso_millis
  - id: steps-intraday
    description: Intraday step samples.
    type: measurement
    category: steps
    granularity: instant
    iterate: measurementValue.activities-steps-intraday.dataset
    timestamp:
      start:
        template: '{measurementValue.activities-steps[0].dateTime} {@item.time}'
        parse_timestamp: '%Y-%m-%d %H:%M:%S'
    payload:
      value:
        path: '@item.value'
        transform: to_int
      raw_value:
        path: '@item.value'
      unit: steps
      label: activities-steps-intraday
      components:
        - name: dataset_type
          value:
            path: '@event.measurementValue.activities-steps-intraday.datasetType'
        - name: dataset_interval
          value:
            path: '@event.measurementValue.activities-steps-intraday.datasetInterval'
            transform: to_int
  - id: distance-daily
    description: Daily distance total from the modified Fitbit export.
    type: measurement
    category: distance
    granularity: daily
    timestamp:
      start:
        path: measurementValue.activities-distance[0].dateTime
        transform: iso_millis
    payload:
      value:
        path: measurementValue.activities-distance[0].value
        transform: to_float
      raw_value:
        path: measurementValue.activities-distance[0].value
      unit: km
      label: activities-distance
      components:
        - name: measurement_type
          value:
            path: measurementType
        - name: measurement_date_time
          value:
            path: measurementDateTime
            transform: iso_millis
  - id: distance-intraday
    description: Intraday distance samples.
    type: measurement
    category: distance
    granularity: instant
    iterate: measurementValue.activities-distance-intraday.dataset
    timestamp:
      start:
        template: '{measurementValue.activities-distance[0].dateTime} {@item.time}'
        parse_timestamp: '%Y-%m-%d %H:%M:%S'
    payload:
      value:
        path: '@item.value'
        transform: to_float
      raw_value:
        path: '@item.value'
      unit: km
      label: activities-distance-intraday
      components:
        - name: dataset_type
          value:
            path: '@event.measurementValue.activities-distance-intraday.datasetType'
        - name: dataset_interval
          value:
            path: '@event.measurementValue.activities-distance-intraday.datasetInterval'
            transform: to_int
  - id: calories-daily
    description: Daily calorie total from the modified Fitbit export.
    type: measurement
    category: calories
    granularity: daily
    timestamp:
      start:
        path: measurementValue.activities-calories[0].dateTime
        transform: iso_millis
    payload:
      value:
        path: measurementValue.activities-calories[0].value
        transform: to_float
      raw_value:
        path: measurementValue.activities-calories[0].value
      unit: kcal
      label: activities-calories
      components:
        - name: measurement_type
          value:
            path: measurementType
        - name: measurement_date_time
          value:
            path: measurementDateTime
            transform: iso_millis
  - id: calories-intraday
    description: Intraday calorie samples with activity metadata.
    type: measurement
    category: calories
    granularity: instant
    iterate: measurementValue.activities-calories-intraday.dataset
    timestamp:
      start:
        template: '{measurementValue.activities-calories[0].dateTime} {@item.time}'
        parse_timestamp: '%Y-%m-%d %H:%M:%S'
    payload:
      value:
        path: '@item.value'
        transform: to_float
      raw_value:
        path: '@item.value'
      unit: kcal
      label: activities-calories-intraday
      components:
        - name: mets
          value:
            path: '@item.mets'
            transform: to_int
        - name: level
          value:
            path: '@item.level'
            transform: to_int
        - name: dataset_type
          value:
            path: '@event.measurementValue.activities-calories-intraday.datasetType'
        - name: dataset_interval
          value:
            path: '@event.measurementValue.activities-calories-intraday.datasetInterval'
            transform: to_int
clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer
    - unit_inferrer
validate:
  enabled:
    - required_fields
    - timestamp_window
    - payload_shape
    - unit_whitelist
    - range
  timestamp_window:
    min: '2014-01-01'
    max: now+1d
  categories:
    steps:
      unit_whitelist:
        - steps
    distance:
      unit_whitelist:
        - km
    calories:
      unit_whitelist:
        - kcal
qualify:
  enabled:
    - completeness
    - duplicates
    - outliers
    - conformance
    - plausibility
  outliers:
    hampel_k: 3.5
    min_group_size: 5
  duplicates:
    fields:
      - subject_id
      - category
      - timestamp
      - payload.value
    value_round_digits: 3
  plausibility:
    warning_count_for_review: 1
fhir:
  enabled: true
  bundle_type: transaction
  include:
    - Patient
    - Observation
omop:
  enabled: true
  include:
    - person
    - measurement
    - observation
    - device_exposure
    - observation_period
