adapter:
  id: fitabase-daily-activity
  version: 1.0.0
  description: 'Fitabase daily activity summary CSV: daily steps headline plus distance and activity-minute components.'
match:
  source: fitabase-daily-activity
  record:
    - field: Id
      exists: true
    - field: ActivityDate
      exists: true
    - field: TotalSteps
      exists: true
defaults:
  subject_id:
    path: Id
  context:
    source: fitabase-daily-activity
    modality: wearable
    device: null
    source_measurement_type: daily activity summary
  stage: structured
  source_record_id:
    template: fitabase-daily-activity:{Id}:{ActivityDate}
emit:
  - id: total-steps
    description: Daily Fitabase total steps.
    type: measurement
    category: activity-summary
    granularity: daily
    timestamp:
      start:
        path: ActivityDate
        parse_timestamp: '%m/%d/%Y'
    payload:
      value:
        path: TotalSteps
      raw_value:
        path: TotalSteps
      unit: steps
      label: TotalSteps
  - id: total-distance
    description: Daily Fitabase total distance.
    type: measurement
    category: activity-summary
    granularity: daily
    timestamp:
      start:
        path: ActivityDate
        parse_timestamp: '%m/%d/%Y'
