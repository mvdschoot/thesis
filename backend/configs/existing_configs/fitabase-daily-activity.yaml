clean:
  heuristics:
    - whitespace
    - name: timestamp_normalizer
      accept_formats:
        - '%m/%d/%Y'
    - type_coercer
    - unit_inferrer
validate:
  enabled:
    - required_fields
    - timestamp_window
    - payload_shape
    - unit_whitelist
    - range
  timestamp_window:
    min: '2014-01-01'
    max: now+1d
  categories:
    activity-summary:
      unit_whitelist:
        - steps
        - km
        - min
        - kcal
qualify:
  enabled:
    - completeness
    - duplicates
    - outliers
    - conformance
    - plausibility
  outliers:
    hampel_k: 3.5
    min_group_size: 5
  duplicates:
    fields:
      - subject_id
      - category
      - timestamp
      - payload.value
    value_round_digits: 3
  plausibility:
    warning_count_for_review: 1
fhir:
  include:
    - Observation
    - Patient
    - Provenance