adapter:
  id: "fitbit-activity-summary-intraday-v1"
  version: "1.0.0"
  description: "Fitbit activity summaries and intraday samples for steps, distance, and calories."

match:
  source: "fitbit"
  record:
    - { field: "userId", exists: true }
    - { field: "measurementType", type: "string", in: ["steps", "distance", "calories"] }
    - { field: "measurementDateTime", exists: true }
    - { field: "measurementValue", type: "object" }
    - { field: "measurementValue.activities-steps", type: "array", non_empty: true }
    - { field: "measurementValue.activities-steps[0].value", exists: true }
    - { field: "measurementValue.activities-steps[0].dateTime", exists: true }
    - { field: "measurementValue.activities-steps-intraday", type: "object" }
    - { field: "measurementValue.activities-steps-intraday.dataset", type: "array", non_empty: true }
    - { field: "measurementValue.activities-steps-intraday.dataset[0].time", exists: true }
    - { field: "measurementValue.activities-steps-intraday.dataset[0].value", exists: true }
    - { field: "measurementValue.activities-distance", type: "array", non_empty: true }
    - { field: "measurementValue.activities-distance[0].value", exists: true }
    - { field: "measurementValue.activities-distance[0].dateTime", exists: true }
    - { field: "measurementValue.activities-distance-intraday", type: "object" }
    - { field: "measurementValue.activities-distance-intraday.dataset", type: "array", non_empty: true }
    - { field: "measurementValue.activities-distance-intraday.dataset[0].time", exists: true }
    - { field: "measurementValue.activities-distance-intraday.dataset[0].value", exists: true }
    - { field: "measurementValue.activities-calories", type: "array", non_empty: true }
    - { field: "measurementValue.activities-calories[0].value", exists: true }
    - { field: "measurementValue.activities-calories[0].dateTime", exists: true }
    - { field: "measurementValue.activities-calories-intraday", type: "object" }
    - { field: "measurementValue.activities-calories-intraday.dataset", type: "array", non_empty: true }
    - { field: "measurementValue.activities-calories-intraday.dataset[0].time", exists: true }
    - { field: "measurementValue.activities-calories-intraday.dataset[0].value", exists: true }

defaults:
  subject_id: { path: "userId" }
  context:
    source: "fitbit"
    modality: "wearable"
    device: null
    source_measurement_type: { path: "measurementType" }
  stage: "structured"
  source_record_id:
    template: "fitbit:{userId}:{measurementType}:{measurementDateTime}"

emit:
  - id: "daily-activity-summary"
    description: "Daily Fitbit activity summary record for steps, distance, or calories."
    type: "summary"
    category:
      lookup:
        key: { path: "measurementType" }
        map:
          "steps": "activity-steps"
          "distance": "activity-distance"
          "calories": "activity-calories"
        default: "unknown"
    granularity: "daily"
    timestamp:
      start: { path: "measurementDateTime", transform: "iso_millis" }
    payload:
      value:
        lookup:
          key: { path: "measurementType" }
          map:
            "steps": { path: "measurementValue.activities-steps[0].value" }
            "distance": { path: "measurementValue.activities-distance[0].value" }
            "calories": { path: "measurementValue.activities-calories[0].value" }
          default: null
      raw_value: { path: "measurementValue" }
      unit:
        lookup:
          key: { path: "measurementType" }
          map:
            "steps": "steps"
            "distance": "km"
            "calories": "kcal"
          default: null
      label: { path: "measurementType" }
    extensions:
      fitbit.measurementType: { path: "measurementType" }

  - id: "intraday-activity-samples"
    description: "Intraday activity samples emitted one event per dataset element."
    type: "measurement"
    category:
      lookup:
        key: { path: "measurementType" }
        map:
          "steps": "activity-steps-intraday"
          "distance": "activity-distance-intraday"
          "calories": "activity-calories-intraday"
        default: "unknown"
    granularity: "interval"
    iterate:
      lookup:
        key: { path: "measurementType" }
        map:
          "steps": { path: "measurementValue.activities-steps-intraday.dataset" }
          "distance": { path: "measurementValue.activities-distance-intraday.dataset" }
          "calories": { path: "measurementValue.activities-calories-intraday.dataset" }
        default: { path: "measurementValue.activities-steps-intraday.dataset" }
    timestamp:
      start:
        template: "{measurementValueDate} {@item.time}"
        parse_timestamp: "%Y-%m-%d %H:%M:%S"
    payload:
      value: { path: "@item.value" }
      raw_value: { path: "@item.value" }
      unit:
        lookup:
          key: { path: "measurementType" }
          map:
            "steps": "steps"
            "distance": "km"
            "calories": "kcal"
          default: null
      label:
        lookup:
          key: { path: "measurementType" }
          map:
            "steps": "intraday steps"
            "distance": "intraday distance"
            "calories": "intraday calories"
          default: "intraday activity sample"
    extensions:
      fitbit.measurementType: { path: "measurementType" }
      fitbit.datasetType:
        lookup:
          key: { path: "measurementType" }
          map:
            "steps": { path: "measurementValue.activities-steps-intraday.datasetType" }
            "distance": { path: "measurementValue.activities-distance-intraday.datasetType" }
            "calories": { path: "measurementValue.activities-calories-intraday.datasetType" }
          default: null
      fitbit.datasetInterval:
        lookup:
          key: { path: "measurementType" }
          map:
            "steps": { path: "measurementValue.activities-steps-intraday.datasetInterval" }
            "distance": { path: "measurementValue.activities-distance-intraday.datasetInterval" }
            "calories": { path: "measurementValue.activities-calories-intraday.datasetInterval" }
          default: null
    quality:
      flags:
        - code: "SYNTHETIC_TIMESTAMP"
          severity: "info"
          stage: "structured"
          message: "Intraday sample timestamp is synthesized from the parent date plus the intraday time column."

clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer
    - unit_inferrer

validate:
  enabled: [required_fields, timestamp_window, payload_shape, unit_whitelist, range]
  timestamp_window: { min: "2014-01-01", max: "now+1d" }
  categories:
    activity-steps:
      unit_whitelist: ["steps"]
    activity-steps-intraday:
      unit_whitelist: ["steps"]
    activity-distance:
      unit_whitelist: ["km"]
    activity-distance-intraday:
      unit_whitelist: ["km"]
    activity-calories:
      unit_whitelist: ["kcal"]
    activity-calories-intraday:
      unit_whitelist: ["kcal"]

qualify:
  enabled: [completeness, duplicates, outliers, conformance, plausibility]
  outliers: { hampel_k: 3.5, min_group_size: 5 }
  duplicates: { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation]

omop:
  enabled: true
  include: [person, measurement, observation, device_exposure, observation_period]
