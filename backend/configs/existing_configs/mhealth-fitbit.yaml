adapter:
  id: mhealth-fitbit
  version: 1.0.0
  description: >-
    mHealth Fitbit export with daily summaries as headline values and 15-minute intraday fan-out, gated by
    measurementType.
match:
  source: mhealth-fitbit
  record:
    - field: userId
      exists: true
    - field: measurementType
      exists: true
    - field: measurementDateTime
      exists: true
defaults:
  subject_id:
    path: userId
  context:
    source: mhealth-fitbit
    modality: wearable
    device: FitBit SmartWatch
    source_measurement_type:
      path: measurementType
  stage: structured
  source_record_id:
    template: mhealth-fitbit:{userId}:{measurementType}:{measurementDateTime}
emit:
  - id: daily-steps
    description: Daily steps summary from Fitbit export.
    type: measurement
    category: steps
    granularity: daily
    when:
      field: measurementType
      equals: steps
    timestamp:
      start:
        path: measurementValue.activities-steps[0].dateTime
        parse_timestamp: '%Y-%m-%d'
    payload:
      value:
        path: measurementValue.activities-steps[0].value
      raw_value:
        path: measurementValue.activities-steps[0].value
      unit: steps
      label: daily steps
    extensions:
      dataset_interval_minutes:
        path: measurementValue.activities-steps-intraday.datasetInterval
      dataset_type:
        path: measurementValue.activities-steps-intraday.datasetType
  - id: intraday-steps
    description: Intraday steps dataset, one event per time slice.
    type: measurement
    category: steps-intraday
    granularity: interval
    when:
      field: measurementType
      equals: steps
    iterate: measurementValue.activities-steps-intraday.dataset
    timestamp:
      start:
        date_from:
          path: measurementValue.activities-steps[0].dateTime
        time_from:
          path: '@item.time'
    payload:
      value:
        path: '@item.value'
      raw_value:
        path: '@item.value'
      unit: steps
      label: intraday steps
    extensions:
      dataset_interval_minutes:
        path: '@event.measurementValue.activities-steps-intraday.datasetInterval'
      dataset_type:
        path: '@event.measurementValue.activities-steps-intraday.datasetType'
  - id: daily-distance
    description: Daily distance summary from Fitbit export.
    type: measurement
    category: distance
    granularity: daily
    when:
      field: measurementType
      equals: distance
    timestamp:
      start:
        path: measurementValue.activities-distance[0].dateTime
        parse_timestamp: '%Y-%m-%d'
    payload:
      value:
        path: measurementValue.activities-distance[0].value
      raw_value:
        path: measurementValue.activities-distance[0].value
      unit: km
      label: daily distance
    extensions:
      dataset_interval_minutes:
        path: measurementValue.activities-distance-intraday.datasetInterval
      dataset_type:
        path: measurementValue.activities-distance-intraday.datasetType
  - id: intraday-distance
    description: Intraday distance dataset, one event per time slice.
    type: measurement
    category: distance-intraday
    granularity: interval
    when:
      field: measurementType
      equals: distance
    iterate: measurementValue.activities-distance-intraday.dataset
    timestamp:
      start:
        date_from:
          path: measurementValue.activities-distance[0].dateTime
        time_from:
          path: '@item.time'
    payload:
      value:
        path: '@item.value'
      raw_value:
        path: '@item.value'
      unit: km
      label: intraday distance
    extensions:
      dataset_interval_minutes:
        path: '@event.measurementValue.activities-distance-intraday.datasetInterval'
      dataset_type:
        path: '@event.measurementValue.activities-distance-intraday.datasetType'
  - id: daily-calories
    description: Daily calories summary from Fitbit export.
    type: measurement
    category: calories
    granularity: daily
    when:
      field: measurementType
      equals: calories
    timestamp:
      start:
        path: measurementValue.activities-calories[0].dateTime
        parse_timestamp: '%Y-%m-%d'
    payload:
      value:
        path: measurementValue.activities-calories[0].value
      raw_value:
        path: measurementValue.activities-calories[0].value
      unit: kcal
      label: daily calories
    extensions:
      dataset_interval_minutes:
        path: measurementValue.activities-calories-intraday.datasetInterval
      dataset_type:
        path: measurementValue.activities-calories-intraday.datasetType
  - id: intraday-calories
    description: Intraday calories dataset, one event per time slice.
    type: measurement
    category: calories-intraday
    granularity: interval
    when:
      field: measurementType
      equals: calories
    iterate: measurementValue.activities-calories-intraday.dataset
    timestamp:
      start:
        date_from:
          path: measurementValue.activities-calories[0].dateTime
        time_from:
          path: '@item.time'
    payload:
      value:
        path: '@item.value'
      raw_value:
        path: '@item.value'
      unit: kcal
      label: intraday calories
      components:
        - name: mets
          value:
            path: '@item.mets'
        - name: level
          value:
            path: '@item.level'
    extensions:
      dataset_interval_minutes:
        path: '@event.measurementValue.activities-calories-intraday.datasetInterval'
      dataset_type:
        path: '@event.measurementValue.activities-calories-intraday.datasetType'
  - id: daily-floors
    description: Daily floors summary from Fitbit export.
    type: measurement
    category: floors
    granularity: daily
    when:
      field: measurementType
      equals: floors
    timestamp:
      start:
        path: measurementValue.activities-floors[0].dateTime
        parse_timestamp: '%Y-%m-%d'
    payload:
      value:
        path: measurementValue.activities-floors[0].value
      raw_value:
        path: measurementValue.activities-floors[0].value
      unit: floor
      label: daily floors
    extensions:
      dataset_interval_minutes:
        path: measurementValue.activities-floors-intraday.datasetInterval
      dataset_type:
        path: measurementValue.activities-floors-intraday.datasetType
  - id: intraday-floors
    description: Intraday floors dataset, one event per time slice.
    type: measurement
    category: floors-intraday
    granularity: interval
    when:
      field: measurementType
      equals: floors
    iterate: measurementValue.activities-floors-intraday.dataset
    timestamp:
      start:
        date_from:
          path: measurementValue.activities-floors[0].dateTime
        time_from:
          path: '@item.time'
    payload:
      value:
        path: '@item.value'
      raw_value:
        path: '@item.value'
      unit: floor
      label: intraday floors
    extensions:
      dataset_interval_minutes:
        path: '@event.measurementValue.activities-floors-intraday.datasetInterval'
      dataset_type:
        path: '@event.measurementValue.activities-floors-intraday.datasetType'
  - id: daily-heart-rate
    description: Daily heart-rate summary from Fitbit export.
    type: measurement
    category: heart-rate-range
    granularity: daily
    when:
      field: measurementType
      equals: heart-rate-intraday
    timestamp:
      start:
        path: measurementValue.activities-heart[0].dateTime
        parse_timestamp: '%Y-%m-%d'
    payload:
      value:
        path: measurementValue.activities-heart[0].value.heartRateZones[0].minutes
      raw_value:
        path: measurementValue.activities-heart[0].value.heartRateZones[0].minutes
      unit: min
      label: daily heart rate
      components:
        - name: min
          value:
            path: measurementValue.activities-heart[0].value.heartRateZones[0].min
        - name: max
          value:
            path: measurementValue.activities-heart[0].value.heartRateZones[0].max
        - name: caloriesOut
          value:
            path: measurementValue.activities-heart[0].value.heartRateZones[0].caloriesOut
        - name: name
          value:
            path: measurementValue.activities-heart[0].value.heartRateZones[0].name
clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer
    - unit_inferrer
validate:
  enabled:
    - required_fields
    - timestamp_window
    - payload_shape
    - unit_whitelist
    - range
  timestamp_window:
    min: '2010-01-01'
    max: now+1d
  categories:
    steps:
      unit_whitelist:
        - steps
    steps-intraday:
      unit_whitelist:
        - steps
    distance:
      unit_whitelist:
        - km
    distance-intraday:
      unit_whitelist:
        - km
    calories:
      unit_whitelist:
        - kcal
    calories-intraday:
      unit_whitelist:
        - kcal
    floors:
      unit_whitelist:
        - floor
    floors-intraday:
      unit_whitelist:
        - floor
    heart-rate:
      unit_whitelist:
        - bpm
        - min
    sleep-log:
      unit_whitelist:
        - min
    sleep-log-intraday:
      unit_whitelist: []
qualify:
  enabled:
    - completeness
    - duplicates
    - outliers
    - conformance
    - plausibility
  outliers:
    hampel_k: 3.5
    min_group_size: 5
  duplicates:
    fields:
      - subject_id
      - category
      - timestamp
      - payload.value
    value_round_digits: 3
  plausibility:
    warning_count_for_review: 1
fhir:
  include:
    - Patient
    - Observation
    - Provenance
    - Device
