adapter:
  id: student-questionnaire-v1-4
  version: 1.0.0
  description: Student questionnaire responses exported as CSV rows; one row per student
    subject, one event per question response.
match:
  source: student-questionnaire
  record:
  - field: Timestamp
    exists: true
  - field: 1 .Are  you having consistent low grades?
    exists: true
  - field: 2. Lack of engagement in coursework?
    exists: true
  - field: 3. Satisfied with your chosen degree?
    exists: true
  - field: 4. Are you attentive and punctual to your classes?
    exists: true
  - field: 5. Do you have good relation with your teachers?
    exists: true
  - field: 6. Do you feel lonely / isolation?
    exists: true
  - field: 7. Do you have aggressive behaviour often?
    exists: true
  - field: 8. Having Sudden mood swings?
    exists: true
  - field: 9. Do you feel difficulty managing emotions?
    exists: true
  - field: 10. Do you often have Excessive worries?
    exists: true
  - field: 11. Are you optimistic?
    exists: true
  - field: 12. Are you?
    exists: true
  - field: 13. Do you find it difficult making friends?
    exists: true
  - field: 14. Are you being bullied?
    exists: true
  - field: 15 . Do u  feel lack of socio support network?
    exists: true
  - field: 16. Do u have family instabilty?
    exists: true
  - field: 17. Do have any siblings?
    exists: true
  - field: 18. Parent low income / unemployment?
    exists: true
  - field: 19. Lack of parent involvement in education?
    exists: true
  - field: 20. Do u have nutritional deficiencies?
    exists: true
  - field: 21. Experienced mental health issues like depression?
    exists: true
  - field: 22. Do u have any chronic health conditions?
    exists: true
  - field: 23. Ever faced any traumatic events?
    exists: true
  - field: 24. Do you experienced family loss or grief?
    exists: true
  - field: 25. Exposure to violence or abuse?
    exists: true
  - field: 26. Do you have any part time job or income source?
    exists: true
  - field: 27. Are you afraid of taking risks?
    exists: true
  - field: 28. Do you have OCD?
    exists: true
  - field: 29. How is your adaptive capability?
    exists: true
  - field: 30. Are you happy with your academic performance?
    exists: true
  - field: 31. Do you have friendly relationship with your parents?
    exists: true
  - field: 32. Gender
    exists: true
  - field: 33. Trouble of sleeping?
    exists: true
  - field: 34. Type of community?
    exists: true
defaults:
  subject_id:
    path: '@record_index'
    transform: to_int
  context:
    source: student-questionnaire
    modality: survey
    device: null
    source_measurement_type: student questionnaire response
  stage: structured
  source_record_id:
    template: student-questionnaire:{@record_index}:{Timestamp}
emit:
- id: questionnaire-response
  description: Emit one survey event per questionnaire answer.
  type: survey
  category:
    lookup:
      key:
        path: '@item.name'
      map:
        1 .Are  you having consistent low grades?: academic-risk
        2. Lack of engagement in coursework?: academic-risk
        3. Satisfied with your chosen degree?: academic-satisfaction
        4. Are you attentive and punctual to your classes?: academic-engagement
        5. Do you have good relation with your teachers?: school-relationship
        6. Do you feel lonely / isolation?: mental-wellbeing
        7. Do you have aggressive behaviour often?: behavioral-risk
        8. Having Sudden mood swings?: mental-wellbeing
        9. Do you feel difficulty managing emotions?: mental-wellbeing
        10. Do you often have Excessive worries?: mental-wellbeing
        11. Are you optimistic?: wellbeing-resilience
        12. Are you?: personality
        13. Do you find it difficult making friends?: social-connection
        14. Are you being bullied?: safety
        15 . Do u  feel lack of socio support network?: social-support
        16. Do u have family instabilty?: family-stability
        17. Do have any siblings?: family-structure
        18. Parent low income / unemployment?: family-economics
        19. Lack of parent involvement in education?: family-support
        20. Do u have nutritional deficiencies?: health-nutrition
        21. Experienced mental health issues like depression?: mental-health-history
        22. Do u have any chronic health conditions?: chronic-health
        23. Ever faced any traumatic events?: trauma
        24. Do you experienced family loss or grief?: bereavement
        25. Exposure to violence or abuse?: violence-exposure
        26. Do you have any part time job or income source?: economic-activity
        27. Are you afraid of taking risks?: risk-attitude
        28. Do you have OCD?: mental-health-history
        29. How is your adaptive capability?: adaptive-capability
        30. Are you happy with your academic performance?: academic-satisfaction
        31. Do you have friendly relationship with your parents?: family-relationship
        32. Gender: demographics
        33. Trouble of sleeping?: sleep
        34. Type of community?: community
      default: unknown
  granularity: instant
  iterate_object:
    source: .
    all_keys: true
    exclude:
    - Timestamp
  timestamp:
    start:
      path: Timestamp
      parse_timestamp: '%m/%d/%Y %H:%M:%S'
  payload:
    value:
      path: '@item.value'
    raw_value:
      path: '@item.value'
    unit: null
    label:
      path: '@item.label'
  extensions:
    student.question:
      path: '@item.name'
    student.answer_raw:
      path: '@item.value'
  quality:
    flags:
    - code: SYNTHETIC_SURVEY_RESPONSE
      severity: info
      stage: structured
      message: Questionnaire row expanded into one survey event per answered item.
clean:
  heuristics:
  - whitespace
  - name: timestamp_normalizer
    accept_formats:
    - '%m/%d/%Y %H:%M:%S'
  - type_coercer
  - unit_inferrer
validate:
  enabled:
  - required_fields
  - timestamp_window
  - payload_shape
  - unit_whitelist
  - range
  timestamp_window:
    min: '2025-01-01'
    max: now+1d
  categories:
    academic-risk:
      expected_fields:
      - payload.value
    academic-satisfaction:
      expected_fields:
      - payload.value
    academic-engagement:
      expected_fields:
      - payload.value
    school-relationship:
      expected_fields:
      - payload.value
    mental-wellbeing:
      expected_fields:
      - payload.value
    behavioral-risk:
      expected_fields:
      - payload.value
    wellbeing-resilience:
      expected_fields:
      - payload.value
    personality:
      expected_fields:
      - payload.value
    social-connection:
      expected_fields:
      - payload.value
    safety:
      expected_fields:
      - payload.value
    social-support:
      expected_fields:
      - payload.value
    family-stability:
      expected_fields:
      - payload.value
    family-structure:
      expected_fields:
      - payload.value
    family-economics:
      expected_fields:
      - payload.value
    family-support:
      expected_fields:
      - payload.value
    health-nutrition:
      expected_fields:
      - payload.value
    mental-health-history:
      expected_fields:
      - payload.value
    chronic-health:
      expected_fields:
      - payload.value
    trauma:
      expected_fields:
      - payload.value
    bereavement:
      expected_fields:
      - payload.value
    violence-exposure:
      expected_fields:
      - payload.value
    economic-activity:
      expected_fields:
      - payload.value
    risk-attitude:
      expected_fields:
      - payload.value
    adaptive-capability:
      expected_fields:
      - payload.value
    family-relationship:
      expected_fields:
      - payload.value
    demographics:
      expected_fields:
      - payload.value
    sleep:
      expected_fields:
      - payload.value
    community:
      expected_fields:
      - payload.value
qualify:
  enabled:
  - completeness
  - duplicates
  - outliers
  - conformance
  - plausibility
  duplicates:
    fields:
    - subject_id
    - category
    - timestamp
    - payload.value
    value_round_digits: 3
  plausibility:
    warning_count_for_review: 1
fhir:
  enabled: true
  bundle_type: transaction
  include:
  - Patient
  - Observation
  - Questionnaire
omop:
  enabled: true
  include:
  - person
  - measurement
  - observation
  - device_exposure
  - observation_period
