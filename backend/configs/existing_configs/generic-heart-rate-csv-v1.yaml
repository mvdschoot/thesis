adapter:
  id: "generic-heart-rate-csv-v1"
  version: "1.0.0"
  description: "CSV heart rate readings in BPM sampled every 5 seconds"

match:
  source: "csv"
  record:
    - { field: "Id", exists: true }
    - { field: "Time", exists: true }
    - { field: "Value", exists: true }
    - { field: "Id", type: "string" }
    - { field: "Time", type: "string" }
    - { field: "Value", type: "number" }

defaults:
  subject_id: { path: "Id" }
  context:
    source: "csv"
    modality: "wearable"
    device: null
    source_measurement_type: "heart-rate"
  stage: "structured"
  source_record_id:
    template: "csv:{Id}:{Time}"

emit:
  - id: "heart-rate-interval"
    description: "Single heart rate sample from CSV"
    type: "measurement"
    category: "heart-rate"
    granularity: "interval"

    timestamp:
      start: { path: "Time", transform: "iso_millis" }
      duration_seconds: 5

    payload:
      value: { path: "Value", transform: "to_float" }
      raw_value: { path: "Value" }
      unit: "bpm"
      label: "Heart Rate"

    extensions:
      csv.Id: { path: "Id" }
      csv.Time: { path: "Time" }

clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer
    - unit_inferrer

validate:
  enabled: [required_fields, timestamp_window, payload_shape, unit_whitelist, range]

qualify:
  enabled: [completeness, duplicates, outliers, conformance, plausibility]
  outliers:    { hampel_k: 3.5, min_group_size: 5 }
  duplicates:  { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation]

omop:
  enabled: true
  include: [person, measurement, observation, device_exposure, observation_period]
