adapter:
  id: "fitbit-hourly-steps-v1"
  version: "1.0.0"
  description: "Fitabase Fitbit export (CSV) — hourly step totals."

match:
  source: "fitbit"
  record:
    - { field: "Id", exists: true }
    - { field: "ActivityHour", exists: true }
    - { field: "StepTotal", exists: true }

defaults:
  subject_id: { path: "Id" }
  context:
    source: "fitbit"
    modality: "wearable"
    device: null
    source_measurement_type: "hourly steps"
  stage: "structured"
  source_record_id:
    template: "fitbit:{Id}:{ActivityHour}"

emit:
  - id: "hourly-steps"
    description: "One hourly step-total measurement from the Fitbit CSV export."
    type: "measurement"
    category: "step-count"
    granularity: "interval"
    timestamp:
      start: { path: "ActivityHour", parse_timestamp: "%m/%d/%Y %I:%M:%S %p" }
      duration_seconds: 3600
    payload:
      value: { path: "StepTotal" }
      raw_value: { path: "StepTotal" }
      unit: "{count}"
      label: "StepTotal"

clean:
  heuristics:
    - whitespace
    - { name: timestamp_normalizer, accept_formats: ["%m/%d/%Y %I:%M:%S %p"] }
    - type_coercer
    - unit_inferrer

validate:
  enabled: [required_fields, timestamp_window, payload_shape, unit_whitelist, range]
  timestamp_window: { min: "2014-01-01", max: "now+1d" }
  categories:
    step-count:
      unit_whitelist: ["{count}"]
      range:
        min: 0
        max: 100000
        on_violation: { severity: "warning", code: "STEP_COUNT_OUT_OF_RANGE" }

qualify:
  enabled: [completeness, duplicates, outliers, conformance, plausibility]
  outliers: { hampel_k: 3.5, min_group_size: 5 }
  duplicates: { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation]
