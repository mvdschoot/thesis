adapter:
  id: "mhealth-app-usage-daily-v1"
  version: "1.0.0"
  description: "mHealth app daily usage and engagement events from aggregated per-day metrics."

match:
  source: "mhealth"
  record:
    - { field: "userId", exists: true }
    - { field: "date", exists: true }
    - { field: "dataType", equals: "app-usage-daily" }
    - { field: "timestamp", exists: true }
    - { field: "metrics", type: "object" }
    - { field: "metrics.exercises", type: "object" }
    - { field: "metrics.recipes", type: "object" }
    - { field: "metrics.education", type: "object" }
    - { field: "metrics.assessments", type: "object" }
    - { field: "metrics.gamification", type: "object" }
    - { field: "metrics.exercises.completed", type: "array", non_empty: true }
    - { field: "metrics.recipes.favorited", type: "array", non_empty: true }
    - { field: "metrics.education.lessonsStarted", type: "array", non_empty: true }
    - { field: "metrics.education.lessonsCompleted", type: "array", non_empty: true }
    - { field: "metrics.assessments.profileQuestionsAnswered", type: "array", non_empty: true }
    - { field: "metrics.gamification.badgesEarned", type: "array", non_empty: true }

defaults:
  subject_id: { path: "userId" }
  context:
    source: "mhealth"
    modality: "app"
    device: null
    source_measurement_type: { path: "dataType" }
  stage: "structured"
  source_record_id:
    template: "mhealth:{userId}:{dataType}:{date}:{timestamp}"

emit:
  - id: "exercise-completed"
    description: "One event per completed exercise."
    type: "event"
    category: "exercise-completed"
    granularity: "instant"
    iterate: "metrics.exercises.completed"
    timestamp:
      start: { path: "@item.completedAt", transform: "iso_millis" }
    payload:
      value: true
      raw_value: { path: "@item.exerciseId" }
      label: "exercise completed"
    extensions:
      mhealth.exerciseId: { path: "@item.exerciseId" }
      mhealth.week: { path: "@item.week" }
      mhealth.day: { path: "@item.day" }

  - id: "recipe-favorited"
    description: "One event per favorited recipe."
    type: "event"
    category: "recipe-favorited"
    granularity: "instant"
    iterate: "metrics.recipes.favorited"
    timestamp:
      start:
        fallback:
          path: "@item.timestamp"
          fallback: { path: "timestamp", transform: "iso_millis" }
    payload:
      value: true
      raw_value: { path: "@item.recipeId" }
      label: "recipe favorited"
    extensions:
      mhealth.recipeId: { path: "@item.recipeId" }

  - id: "lesson-started"
    description: "One event per started lesson."
    type: "event"
    category: "lesson-started"
    granularity: "instant"
    iterate: "metrics.education.lessonsStarted"
    timestamp:
      start: { path: "@item.startedAt", transform: "iso_millis" }
    payload:
      value: true
      raw_value: { path: "@item.lessonId" }
      label: "lesson started"
    extensions:
      mhealth.lessonId: { path: "@item.lessonId" }

  - id: "lesson-completed"
    description: "One event per completed lesson."
    type: "event"
    category: "lesson-completed"
    granularity: "instant"
    iterate: "metrics.education.lessonsCompleted"
    timestamp:
      start: { path: "@item.completedAt", transform: "iso_millis" }
    payload:
      value: true
      raw_value: { path: "@item.lessonId" }
      label: "lesson completed"
    extensions:
      mhealth.lessonId: { path: "@item.lessonId" }

  - id: "profile-question-answered"
    description: "One event per answered profile question."
    type: "survey"
    category: "profile-question-answered"
    granularity: "instant"
    iterate: "metrics.assessments.profileQuestionsAnswered"
    timestamp:
      start:
        fallback:
          path: "@item.answeredAt"
          fallback: { path: "timestamp", transform: "iso_millis" }
    payload:
      value: true
      raw_value: { path: "@item.questionId" }
      label: "profile question answered"
    extensions:
      mhealth.questionId: { path: "@item.questionId" }
      mhealth.questionCategoryId:
        fallback:
          path: "@item.questionCategoryId"
          fallback: null

  - id: "badge-earned"
    description: "One event per earned badge."
    type: "event"
    category: "badge-earned"
    granularity: "instant"
    iterate: "metrics.gamification.badgesEarned"
    timestamp:
      start: { path: "@item.unlockedAt", transform: "iso_millis" }
    payload:
      value: true
      raw_value: { path: "@item.badgeId" }
      label: "badge earned"
    extensions:
      mhealth.badgeId: { path: "@item.badgeId" }

clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer

validate:
  enabled: [required_fields, timestamp_window, payload_shape]
  timestamp_window: { min: "2000-01-01", max: "now+1d" }

qualify:
  enabled: [completeness, duplicates, plausibility]
  duplicates: { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation, Questionnaire]

omop:
  enabled: true
  include: [person, measurement, observation, device_exposure, observation_period]
