adapter:
  id: "fitbit-minute-steps-v1"
  version: "1.0.0"
  description: "Fitbit CSV export of minute-level step counts."

match:
  source: "fitbit"
  record:
    - { field: "Id", exists: true }
    - { field: "ActivityMinute", exists: true }
    - { field: "Steps", exists: true }

defaults:
  subject_id: { path: "Id" }
  context:
    source: "fitbit"
    modality: "wearable"
    device: null
    source_measurement_type: "minute steps"
  stage: "structured"
  source_record_id:
    template: "fitbit:{Id}:{ActivityMinute}"

emit:
  - id: "minute-steps"
    description: "One minute-level step-count measurement from the Fitbit CSV export."
    type: "measurement"
    category: "steps"
    granularity: "instant"
    timestamp:
      start: { path: "ActivityMinute", parse_timestamp: "%m/%d/%Y %I:%M:%S %p" }
    payload:
      value: { path: "Steps" }
      raw_value: { path: "Steps" }
      unit: "count"
      label: "Steps"

clean:
  heuristics:
    - whitespace
    - { name: timestamp_normalizer, accept_formats: ["%m/%d/%Y %I:%M:%S %p"] }
    - type_coercer
    - unit_inferrer

validate:
  enabled: [required_fields, timestamp_window, payload_shape, unit_whitelist, range]
  timestamp_window: { min: "2014-01-01", max: "now+1d" }

qualify:
  enabled: [completeness, duplicates, outliers, conformance, plausibility]
  outliers: { hampel_k: 3.5, min_group_size: 5 }
  duplicates: { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation]

omop:
  enabled: true
  include: [person, measurement, observation, device_exposure, observation_period]
