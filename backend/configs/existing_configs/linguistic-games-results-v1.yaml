adapter:
  id: "linguistic-games-results-v1"
  version: "1.0.0"
  description: "Results data from a serious linguistic game, emitting one canonical event per result row."

match:
  source: "linguistic-games"
  record:
    - { field: "username", exists: true }
    - { field: "results", type: "array", non_empty: true }
    - { field: "results[0].game", exists: true }
    - { field: "results[0].level", exists: true }
    - { field: "results[0].score", exists: true }
    - { field: "results[0].avg_score", exists: true }
    - { field: "results[0].avg_errors", exists: true }
    - { field: "results[0].times_played", exists: true }
    - { field: "results[0].state", exists: true }
    - field: "results[0].game"
      in:
        - "word-recall"
        - "anagram"

defaults:
  subject_id: { path: "username" }
  context:
    source: "linguistic-games"
    modality: "game"
    device: null
    source_measurement_type: { path: "results[0].game" }
  stage: "structured"
  source_record_id:
    template: "linguistic-games:{username}:{results[0].game}:{results[0].level}"

emit:
  - id: "game-result"
    description: "One result event per game row"
    type: "observation"
    category:
      lookup:
        key: { path: "@item.game" }
        map:
          "word-recall": "word-recall-result"
          "anagram": "anagram-result"
        default: "game-result"
    granularity: "session"
    iterate: "results"

    timestamp:
      start: "2024-01-01T00:00:00.000Z"

    payload:
      value: { path: "@item.score" }
      raw_value: { path: "@item" }
      unit: "score"
      label:
        template: "{@item.game} level {@item.level}"

    extensions:
      linguistic-games.game: { path: "@item.game" }
      linguistic-games.level: { path: "@item.level" }
      linguistic-games.avg_score: { path: "@item.avg_score" }
      linguistic-games.avg_errors: { path: "@item.avg_errors" }
      linguistic-games.times_played: { path: "@item.times_played" }
      linguistic-games.state: { path: "@item.state" }

    quality:
      flags:
        - code: "SYNTHETIC_TIMESTAMP"
          severity: "info"
          stage: "structured"
          message: "Source record contains no per-result timestamp; synthetic timestamp assigned."
        - condition: { path: "@item.state", equals: "-" }
          code: "UNKNOWN_STATE"
          severity: "warning"
          stage: "structured"
          message: "Result state is missing or unspecified."

clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer
    - unit_inferrer

validate:
  enabled: [required_fields, timestamp_window, payload_shape, unit_whitelist, range]

qualify:
  enabled: [completeness, duplicates, outliers, conformance, plausibility]
  outliers:    { hampel_k: 3.5, min_group_size: 5 }
  duplicates:  { fields: [subject_id, category, timestamp, payload.value], value_round_digits: 3 }
  plausibility: { warning_count_for_review: 1 }

fhir:
  enabled: true
  bundle_type: transaction
  include: [Patient, Observation]
