adapter:
  id: fitbit-hourly-steps-v1-2
  version: 1.0.0
  description: Hourly step totals from a Fitbit activity CSV export
match:
  source: fitbit
  record:
  - field: Id
    exists: true
  - field: ActivityHour
    exists: true
  - field: StepTotal
    exists: true
  - field: Id
    type: string
  - field: ActivityHour
    type: string
  - field: StepTotal
    type: number
defaults:
  subject_id:
    path: Id
  context:
    source: fitbit
    modality: wearable
    device: null
    source_measurement_type: hourly-steps
  stage: structured
  source_record_id:
    template: fitbit:{Id}:{ActivityHour}
emit:
- id: hourly-steps
  description: One hourly step total measurement
  type: measurement
  category: steps
  granularity: interval
  timestamp:
    start:
      path: ActivityHour
      transform: iso_millis
    duration_seconds: 3600
  payload:
    value:
      path: StepTotal
      transform: to_int
    raw_value:
      path: StepTotal
    unit: steps
    label: Hourly Steps
  extensions:
    fitbit.activityHour:
      path: ActivityHour
