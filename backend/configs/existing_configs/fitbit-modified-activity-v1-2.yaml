adapter:
  id: fitbit-modified-activity-v1-2
  version: 1.0.0
  description: >-
    Heavily modified Fitbit daily activity exports with per-day summaries and intraday datasets for steps, distance, and
    calories.
match:
  source: fitbit
  record:
    - field: userId
      exists: true
    - field: measurementType
      exists: true
    - field: measurementDateTime
      exists: true
    - field: measurementValue
      exists: true
defaults:
  subject_id:
    path: userId
  context:
    source: fitbit
    modality: wearable
    device: null
    source_measurement_type:
      path: measurementType
  stage: structured
  source_record_id:
    template: fitbit:{userId}:{measurementType}:{measurementDateTime}
emit:
  - id: fitbit-daily-summary
    description: Daily Fitbit summary row for steps, distance, or calories.
    type: measurement
    category:
      lookup:
        key:
          path: measurementType
        map:
          steps: steps
          distance: distance
          calories: calories
        default: unknown
    granularity: daily
    timestamp:
      start:
        path: measurementValue.activities-steps[0].dateTime
        parse_timestamp: '%Y-%m-%d'
    payload:
      value:
        lookup:
          key:
            path: measurementType
          map:
            steps:
              path: measurementValue.activities-steps[0].value
            distance:
              path: measurementValue.activities-distance[0].value
            calories:
              path: measurementValue.activities-calories[0].value
          default: null
      raw_value:
        lookup:
          key:
            path: measurementType
          map:
            steps:
              path: measurementValue.activities-steps[0].value
            distance:
              path: measurementValue.activities-distance[0].value
            calories:
              path: measurementValue.activities-calories[0].value
          default: null
      unit:
        lookup:
          key:
            path: measurementType
          map:
            steps: count
            distance: km
            calories: kcal
          default: null
      label:
        path: measurementType
      components:
        - name: measurementDateTime
          value:
            path: measurementDateTime
        - name: summary_date
          value:
            lookup:
              key:
                path: measurementType
              map:
                steps:
                  path: measurementValue.activities-steps[0].dateTime
                distance:
                  path: measurementValue.activities-distance[0].dateTime
                calories:
                  path: measurementValue.activities-calories[0].dateTime
  - id: fitbit-intraday-dataset
    description: Intraday minute-level dataset entries for steps, distance, and calories.
    type: measurement
    category:
      lookup:
        key:
          path: measurementType
        map:
          steps: steps-intraday
          distance: distance-intraday
          calories: calories-intraday
        default: unknown
    granularity: interval
    iterate:
      lookup:
        key:
          path: measurementType
        map:
          steps:
            path: measurementValue.activities-steps-intraday.dataset
          distance:
            path: measurementValue.activities-distance-intraday.dataset
          calories:
            path: measurementValue.activities-calories-intraday.dataset
        default: []
    timestamp:
      start:
        template: '{measurementDateTime:0:10} {@item.time}'
        parse_timestamp: '%Y-%m-%d %H:%M:%S'
      duration_seconds:
        multiply:
          - path: measurementValue.activities-steps-intraday.datasetInterval
            fallback:
              path: measurementValue.activities-distance-intraday.datasetInterval
              fallback:
                path: measurementValue.activities-calories-intraday.datasetInterval
          - 60
    payload:
      value:
        path: '@item.value'
      raw_value:
        path: '@item.value'
      unit:
        lookup:
          key:
            path: measurementType
          map:
            steps: count
            distance: km
            calories: kcal
          default: null
      label:
        template: '{measurementType} intraday'
      components:
        - name: time
          value:
            path: '@item.time'
        - name: datasetType
          value:
            lookup:
              key:
                path: measurementType
              map:
                steps:
                  path: measurementValue.activities-steps-intraday.datasetType
                distance:
                  path: measurementValue.activities-distance-intraday.datasetType
                calories:
                  path: measurementValue.activities-calories-intraday.datasetType
              default: null
        - name: datasetInterval
          value:
            lookup:
              key:
                path: measurementType
              map:
                steps:
                  path: measurementValue.activities-steps-intraday.datasetInterval
                distance:
                  path: measurementValue.activities-distance-intraday.datasetInterval
                calories:
                  path: measurementValue.activities-calories-intraday.datasetInterval
              default: null
        - name: mets
          value:
            path: '@item.mets'
        - name: level
          value:
            path: '@item.level'
clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer
    - unit_inferrer
validate:
  enabled:
    - required_fields
    - timestamp_window
    - payload_shape
    - unit_whitelist
    - range
  timestamp_window:
    min: '2014-01-01'
    max: now+1d
qualify:
  enabled:
    - completeness
    - duplicates
    - outliers
    - conformance
    - plausibility
  outliers:
    hampel_k: 3.5
    min_group_size: 5
  duplicates:
    fields:
      - subject_id
      - category
      - timestamp
      - payload.value
    value_round_digits: 3
  plausibility:
    warning_count_for_review: 1
fhir:
  enabled: true
  bundle_type: transaction
  include:
    - Patient
    - Observation
    - Provenance
omop:
  enabled: true
  include:
    - person
    - measurement
    - observation
    - device_exposure
    - observation_period
