adapter:
  id: mhealth-app-usage-daily-v1-2
  version: 1.0.0
  description: >-
    mHealth app daily usage export capturing exercises, recipes, education, assessments, and gamification engagement
    events.
match:
  source: mhealth
  record:
    - field: userId
      exists: true
    - field: date
      exists: true
    - field: dataType
      equals: app-usage-daily
    - field: timestamp
      exists: true
    - field: metrics
      exists: true
    - field: metrics.exercises
      exists: true
    - field: metrics.exercises.completed
      exists: true
    - field: metrics.exercises.completed
      type: array
    - field: metrics.recipes
      exists: true
    - field: metrics.recipes.favorited
      exists: true
    - field: metrics.recipes.favorited
      type: array
    - field: metrics.education
      exists: true
    - field: metrics.education.lessonsStarted
      exists: true
    - field: metrics.education.lessonsStarted
      type: array
    - field: metrics.education.lessonsCompleted
      exists: true
    - field: metrics.education.lessonsCompleted
      type: array
    - field: metrics.gamification
      exists: true
    - field: metrics.gamification.badgesEarned
      exists: true
    - field: metrics.gamification.badgesEarned
      type: array
defaults:
  subject_id:
    path: userId
  context:
    source: mhealth
    modality: app
    device: null
    source_measurement_type:
      path: dataType
  stage: structured
  source_record_id:
    template: mhealth:{userId}:{dataType}:{date}
emit:
  - id: exercise-completed
    description: One event per completed exercise.
    type: event
    category: exercise-completed
    granularity: instant
    iterate: metrics.exercises.completed
    timestamp:
      start:
        path: '@item.completedAt'
        transform: iso_millis
    payload:
      value:
        path: '@item.exerciseId'
      raw_value:
        path: '@item.exerciseId'
      unit: null
      label: exerciseId
      components:
        - name: exerciseId
          value:
            path: '@item.exerciseId'
          unit: null
        - name: week
          value:
            path: '@item.week'
          unit: null
        - name: day
          value:
            path: '@item.day'
          unit: null
    extensions:
      mhealth.exerciseId:
        path: '@item.exerciseId'
      mhealth.week:
        path: '@item.week'
      mhealth.day:
        path: '@item.day'
      mhealth.completedAt:
        path: '@item.completedAt'
  - id: recipe-favorited
    description: One event per favorited recipe.
    type: event
    category: recipe-favorited
    granularity: instant
    iterate: metrics.recipes.favorited
    timestamp:
      start:
        path: '@item.timestamp'
        fallback:
          path: '@event.timestamp'
          transform: iso_millis
    payload:
      value:
        path: '@item.recipeId'
      raw_value:
        path: '@item.recipeId'
      unit: null
      label: recipeId
      components:
        - name: recipeId
          value:
            path: '@item.recipeId'
          unit: null
    extensions:
      mhealth.recipeId:
        path: '@item.recipeId'
      mhealth.timestamp:
        path: '@item.timestamp'
  - id: lesson-started
    description: One event per started lesson.
    type: event
    category: lesson-started
    granularity: instant
    iterate: metrics.education.lessonsStarted
    timestamp:
      start:
        path: '@item.startedAt'
        transform: iso_millis
    payload:
      value:
        path: '@item.lessonId'
      raw_value:
        path: '@item.lessonId'
      unit: null
      label: lessonId
      components:
        - name: lessonId
          value:
            path: '@item.lessonId'
          unit: null
    extensions:
      mhealth.lessonId:
        path: '@item.lessonId'
      mhealth.startedAt:
        path: '@item.startedAt'
  - id: lesson-completed
    description: One event per completed lesson.
    type: event
    category: lesson-completed
    granularity: instant
    iterate: metrics.education.lessonsCompleted
    timestamp:
      start:
        path: '@item.completedAt'
        transform: iso_millis
    payload:
      value:
        path: '@item.lessonId'
      raw_value:
        path: '@item.lessonId'
      unit: null
      label: lessonId
      components:
        - name: lessonId
          value:
            path: '@item.lessonId'
          unit: null
    extensions:
      mhealth.lessonId:
        path: '@item.lessonId'
      mhealth.completedAt:
        path: '@item.completedAt'
  - id: profile-question-answered
    description: One event per answered profile question.
    type: survey
    category: profile-question-answered
    granularity: instant
    iterate: metrics.assessments.profileQuestionsAnswered
    timestamp:
      start:
        path: '@item.answeredAt'
        fallback:
          path: '@event.timestamp'
          transform: iso_millis
    payload:
      value:
        path: '@item.questionId'
      raw_value:
        path: '@item.questionId'
      unit: null
      label: questionId
      components:
        - name: questionId
          value:
            path: '@item.questionId'
          unit: null
        - name: questionCategoryId
          value:
            path: '@item.questionCategoryId'
          unit: null
    extensions:
      mhealth.questionId:
        path: '@item.questionId'
      mhealth.questionCategoryId:
        path: '@item.questionCategoryId'
      mhealth.answeredAt:
        path: '@item.answeredAt'
  - id: badge-earned
    description: One event per earned badge.
    type: event
    category: badge-earned
    granularity: instant
    iterate: metrics.gamification.badgesEarned
    timestamp:
      start:
        path: '@item.unlockedAt'
        transform: iso_millis
    payload:
      value:
        path: '@item.badgeId'
      raw_value:
        path: '@item.badgeId'
      unit: null
      label: badgeId
      components:
        - name: badgeId
          value:
            path: '@item.badgeId'
          unit: null
    extensions:
      mhealth.badgeId:
        path: '@item.badgeId'
      mhealth.unlockedAt:
        path: '@item.unlockedAt'
clean:
  heuristics:
    - whitespace
    - timestamp_normalizer
    - type_coercer
    - unit_inferrer
validate:
  enabled:
    - required_fields
    - timestamp_window
    - payload_shape
    - unit_whitelist
    - range
  timestamp_window:
    min: '2020-01-01'
    max: now+1d
qualify:
  enabled:
    - completeness
    - duplicates
    - outliers
    - conformance
    - plausibility
  duplicates:
    fields:
      - subject_id
      - category
      - timestamp
      - payload.value
    value_round_digits: 3
  plausibility:
    warning_count_for_review: 1
fhir:
  enabled: true
  bundle_type: transaction
  include:
    - Patient
    - Observation
    - Questionnaire
omop:
  enabled: true
  include:
    - person
    - measurement
    - observation
    - device_exposure
    - observation_period
