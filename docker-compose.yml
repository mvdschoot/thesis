# Harmonia: 5 pipeline stages + gateway, glued by Kafka.
#
#   gateway → transform-requests → connector → connector-out
#          → adapter   → adapter-out
#          → cleaner   → cleaner-out
#          → validator → validator-out
#          → qualifier → transform-results → gateway (HTTP response)
#
# Kafka runs in KRaft mode (no Zookeeper). Single broker — fine for thesis-scale.
# Frontend stays out of compose; run `npm run dev` against http://localhost:8000.

services:
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui
    container_name: harmonia-kafka-ui
    ports:
      - 8080:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
    # volumes:
    #   - ~/kui/config.yml:/etc/kafkaui/dynamic_config.yaml

  kafka:
    image: apache/kafka:latest
    container_name: harmonia-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_MESSAGE_MAX_BYTES=16777216
      - KAFKA_REPLICA_FETCH_MAX_BYTES=16777216
      # Single-broker cluster — the apache/kafka image defaults internal topics
      # to RF=3, which blocks __consumer_offsets creation and stalls every
      # consumer in GroupCoordinatorNotAvailableError. Force RF=1.
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  api-gateway:
    build:
      context: ./backend
    container_name: harmonia-gateway
    command: ["uvicorn", "services.gateway.app:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL=${LLM_MODEL:-claude-opus-4-7}
      - TRANSFORM_TIMEOUT_SECONDS=${TRANSFORM_TIMEOUT_SECONDS:-60}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/configs:/app/configs
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  connector-svc:
    build:
      context: ./backend
    container_name: harmonia-connector
    command: ["python", "-m", "services.connector.worker"]
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  adapter-svc:
    build:
      context: ./backend
    container_name: harmonia-adapter
    command: ["python", "-m", "services.adapter.worker"]
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  cleaner-svc:
    build:
      context: ./backend
    container_name: harmonia-cleaner
    command: ["python", "-m", "services.cleaner.worker"]
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  validator-svc:
    build:
      context: ./backend
    container_name: harmonia-validator
    command: ["python", "-m", "services.validator.worker"]
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - QUALITY_RULES_PATH=/app/configs/quality_rules.yaml
    volumes:
      - ./backend/configs:/app/configs:ro
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  qualifier-svc:
    build:
      context: ./backend
    container_name: harmonia-qualifier
    command: ["python", "-m", "services.qualifier.worker"]
    environment:
      - KAFKA_BOOTSTRAP=kafka:9092
      - QUALITY_RULES_PATH=/app/configs/quality_rules.yaml
    volumes:
      - ./backend/configs:/app/configs:ro
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka-data:
