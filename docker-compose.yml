# Single-service backend. The Python process holds every pipeline stage
# in-memory and exposes the HTTP API on :8000. Run the frontend separately
# with `npm run dev` against this URL.

services:
  api:
    build:
      context: ./backend
    container_name: harmonia-api
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-claude-opus-4-7}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/configs:/app/configs
    restart: unless-stopped
